name: Deploy Documentation

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
        
      - name: Install Doxygen
        run: sudo apt-get install doxygen -y
        
      - name: Build English documentation
        run: |
          mkdir -p docs/en
          doxygen Doxyfile_en

      - name: Build Russian documentation
        run: |
          mkdir -p docs/ru
          doxygen Doxyfile_ru

      - name: Deploy English documentation to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/en/_site
          destination_dir: en
          nojekyll: true

      - name: Deploy Russian documentation to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/ru/_site
          destination_dir: ru
          nojekyll: true
